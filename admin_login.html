<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moozu - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #000, #0a0a0a, #000);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 204, 85, 0.08) 0%, transparent 50%);
            animation: floatGradient 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes floatGradient {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20%, 15%) scale(1.1); }
            66% { transform: translate(-15%, 20%) scale(0.95); }
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .admin-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 100;
            letter-spacing: -0.08em;
            background: linear-gradient(90deg, #fff, #00cc55, #fff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 200% center; }
            50% { background-position: -200% center; }
        }

        .admin-subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            letter-spacing: 0.3px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .form-minimal {
            max-width: 380px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            color: white;
            font-size: 15px;
            font-weight: 300;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-bottom-color: rgba(0, 204, 85, 0.5);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .captcha-box {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin-bottom: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        .login-btn {
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-minimal {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 14px 50px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-minimal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: rgba(0, 204, 85, 0.1);
            transition: width 0.4s ease;
            z-index: -1;
        }

        .btn-minimal:hover {
            color: white;
            border-color: rgba(0, 204, 85, 0.5);
        }

        .btn-minimal:hover::before {
            width: 100%;
        }

        .alert {
            padding: 20px;
            margin-bottom: 30px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.05);
            color: rgba(0, 255, 136, 0.8);
            border-color: rgba(0, 255, 136, 0.2);
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.05);
            color: rgba(255, 68, 68, 0.8);
            border-color: rgba(255, 68, 68, 0.2);
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .back-link a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #00cc55;
            transition: width 0.3s ease;
        }

        .back-link a:hover {
            color: white;
        }

        .back-link a:hover::after {
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 25px;
            }
            
            .back-link {
                top: 25px;
                left: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="index.html">← back</a>
    </div>

    <div class="login-container">
        <h1 class="admin-title">admin</h1>
        <p class="admin-subtitle">secure access</p>

        <div id="alerts"></div>

        <form class="form-minimal" id="adminLoginForm">
            <div class="form-group">
                <label for="username">username</label>
                <input type="text" id="username" name="username" placeholder="enter username" required>
            </div>
            <div class="form-group">
                <label for="password">password</label>
                <input type="password" id="password" name="password" placeholder="enter password" required>
            </div>
            <div class="captcha-box">
                captcha verification required
            </div>
            <button type="submit" class="btn-minimal login-btn">sign in</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/api';

        // Admin login form
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showAlert('please enter username and password', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/login.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('adminToken', result.data.token);
                    localStorage.setItem('adminUser', JSON.stringify(result.data.user));
                    showAlert('login successful', 'success');
                    
                    // Redirect to admin dashboard after a short delay
                    setTimeout(() => {
                        window.location.href = 'admin_dashboard.html';
                    }, 1000);
                } else {
                    showAlert(result.message || 'invalid credentials', 'error');
                }
            } catch (error) {
                console.error('Admin login error:', error);
                showAlert('login failed. please try again', 'error');
            }
        });

        // Show alert messages
        function showAlert(message, type) {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            alertsContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ngwg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Multi-layer animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #000, #0a0a0a, #000);
            z-index: -4;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 204, 85, 0.12) 0%, transparent 50%);
            animation: floatGradient 25s ease-in-out infinite;
            z-index: -3;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(0, 204, 85, 0.3);
            border-radius: 50%;
            animation: float 20s infinite linear;
            z-index: -2;
        }

        .particle:nth-child(odd) {
            background: rgba(147, 20, 255, 0.2);
            animation-duration: 25s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Animated grid overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 204, 85, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 204, 85, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 30s linear infinite;
            z-index: -2;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Pulse rings around the bio container */
        .pulse-ring {
            position: absolute;
            border: 1px solid rgba(0, 204, 85, 0.1);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }

        .pulse-ring:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0s;
        }

        .pulse-ring:nth-child(2) {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1s;
        }

        .pulse-ring:nth-child(3) {
            width: 700px;
            height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.8;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes floatGradient {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20%, 15%) scale(1.1); }
            66% { transform: translate(-15%, 20%) scale(0.95); }
        }

        .bio-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        /* Glassmorphism container */
        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .username {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 100;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #fff, #00cc55, #fff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            margin-bottom: 40px;
        }

        .username::after {
            content: 'ngwg';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 204, 85, 0.1), transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 3s infinite;
            z-index: -1;
        }

        @keyframes shimmerExpanded {
            0%, 100% { background-position: 300% center; }
            50% { background-position: -300% center; }
        }

        @keyframes glitch {
            0%, 96%, 100% { transform: translate(0); }
            97% { transform: translate(2px, 0); }
            98% { transform: translate(-2px, 2px); }
            99% { transform: translate(2px, -2px); }
        }

        .skills {
            margin-bottom: 50px;
            position: relative;
        }

        .skills-text {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            line-height: 1.8;
            position: relative;
        }

        .skills-text::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00cc55, transparent);
            animation: lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.3; width: 60px; }
            50% { opacity: 1; width: 120px; }
        }

        .spotify-player {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }


        @keyframes audioViz {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        .spotify-player::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 204, 85, 0.05), transparent);
            animation: scanLine 3s infinite;
        }

        @keyframes scanLine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .track-info {
            margin-bottom: 20px;
        }

        .track-title {
            font-size: 18px;
            font-weight: 400;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .track-artist {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3px;
        }

        .spotify-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .control-btn:hover {
            border-color: rgba(0, 204, 85, 0.5);
            color: #00cc55;
            transform: scale(1.05);
        }

        .play-btn {
            width: 55px;
            height: 55px;
            background: rgba(0, 204, 85, 0.1);
            border-color: rgba(0, 204, 85, 0.3);
            color: #00cc55;
        }

        .play-btn:hover {
            background: rgba(0, 204, 85, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00cc55, #ff69b4);
            width: 0%;
            transition: width 0.1s linear;
            animation: progressAnimation 180s linear infinite;
        }

        @keyframes progressAnimation {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .volume-icon {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .volume-slider {
            width: 100px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            background: #00cc55;
            width: 70%;
            border-radius: 2px;
        }

        .cta-button {
            background: linear-gradient(45deg, rgba(0, 204, 85, 0.1), rgba(147, 20, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            padding: 18px 70px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 204, 85, 0.2);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0, 204, 85, 0.2), rgba(147, 20, 255, 0.2));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .cta-button:hover {
            color: white;
            border-color: rgba(0, 204, 85, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 204, 85, 0.4);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover::after {
            opacity: 1;
        }

        /* Hidden audio element */
        .hidden-audio {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bio-container {
                padding: 30px 20px;
                max-width: 400px;
            }
            
            .spotify-player {
                padding: 20px;
            }
            
            .spotify-controls {
                gap: 15px;
            }
            
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 12px;
            }
            
            .play-btn {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .bio-container {
                padding: 20px 15px;
            }
            
            .username {
                font-size: 2.5rem;
            }
            
            .cta-button {
                padding: 14px 40px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated grid overlay -->
    <div class="grid-overlay"></div>
    
    <!-- Pulse rings -->
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>

    <div class="bio-container">
        <div class="glass-container">
            <h1 class="username">ngwg</h1>
            
            <div class="skills">
                <div class="skills-text">
                    c++, lua, assembly developer
                </div>
            </div>

            <div class="spotify-player">
                <!-- Audio visualizer -->
                <div class="audio-visualizer">
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                </div>

                <div class="track-info">
                    <div class="track-title" id="trackTitle">Blow Me</div>
                    <div class="track-artist" id="trackArtist">fakemink</div>
                </div>
                
                <div class="spotify-controls">
                    <button class="control-btn" onclick="previousTrack()">⏮</button>
                    <button class="control-btn play-btn" onclick="togglePlay()" id="playBtn">▶</button>
                    <button class="control-btn" onclick="nextTrack()">⏭</button>
                </div>
                
                <div class="progress-bar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                
                <div class="volume-control">
                    <span class="volume-icon">🔊</span>
                    <div class="volume-slider" onclick="setVolume(event)">
                        <div class="volume-fill" id="volumeFill"></div>
                    </div>
                </div>
            </div>

            <a href="https://discord.gg/nightrbx" target="_blank" class="cta-button">get night now</a>
        </div>
    </div>

    <!-- Audio element for music playback -->
    <audio id="backgroundAudio" loop="false">
        <source src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Playlist of local songs
        const playlist = [
            {
                title: "Blow Me",
                artist: "fakemink",
                file: "songs/Blow Me - fakemink.mp3"
            },
            {
                title: "mhm",
                artist: "freemyswag",
                file: "songs/mhm - freemyswag.mp3"
            },
            {
                title: "flex a band",
                artist: "KD!",
                file: "songs/flex a band - KD!.mp3"
            }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        let volume = 0.7;
        let progressInterval;

        const audio = document.getElementById('backgroundAudio');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeDisplay = document.getElementById('currentTime');
        const totalTimeDisplay = document.getElementById('totalTime');
        const volumeFill = document.getElementById('volumeFill');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');

        // Initialize player
        function initPlayer() {
            loadTrack(currentTrackIndex);
            audio.volume = volume;
            volumeFill.style.width = (volume * 100) + '%';
        }

        // Load a track
        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.file;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            
            // Reset progress
            progressFill.style.width = '0%';
            currentTimeDisplay.textContent = '0:00';
            
            // Update total time when metadata loads
            audio.addEventListener('loadedmetadata', function() {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                totalTimeDisplay.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            });
        }

        // Auto-play on page load
        window.addEventListener('load', function() {
            initPlayer();
            setTimeout(() => {
                playMusic();
            }, 1000);
        });

        // Fallback: play on first user interaction
        document.addEventListener('click', function playOnFirstClick() {
            if (!isPlaying) {
                playMusic();
            }
            document.removeEventListener('click', playOnFirstClick);
        }, { once: true });

        function playMusic() {
            audio.play().then(() => {
                isPlaying = true;
                playBtn.innerHTML = '⏸';
                startProgressTracking();
            }).catch(e => {
                console.log('Audio play failed:', e);
            });
        }

        function pauseMusic() {
            audio.pause();
            isPlaying = false;
            playBtn.innerHTML = '▶';
            clearInterval(progressInterval);
        }

        function togglePlay() {
            if (isPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        }

        function startProgressTracking() {
            progressInterval = setInterval(() => {
                if (audio.duration) {
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = progressPercent + '%';
                    
                    const minutes = Math.floor(audio.currentTime / 60);
                    const seconds = Math.floor(audio.currentTime % 60);
                    currentTimeDisplay.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                }
            }, 100);
        }

        function previousTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                playMusic();
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                playMusic();
            }
        }

        function seekTo(event) {
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percent = x / rect.width;
            
            if (audio.duration) {
                audio.currentTime = audio.duration * percent;
            }
        }

        function setVolume(event) {
            const slider = event.currentTarget;
            const rect = slider.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percent = Math.max(0, Math.min(1, x / rect.width));
            
            volume = percent;
            audio.volume = volume;
            volumeFill.style.width = (volume * 100) + '%';
        }

        // Auto-advance to next track when current track ends
        audio.addEventListener('ended', function() {
            nextTrack();
        });

        // Handle audio loading errors
        audio.addEventListener('error', function(e) {
            console.log('Audio loading error for:', playlist[currentTrackIndex].file);
            // Try next track if current fails
            nextTrack();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moozu - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #000, #0a0a0a, #000);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 204, 85, 0.08) 0%, transparent 50%);
            animation: floatGradient 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes floatGradient {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20%, 15%) scale(1.1); }
            66% { transform: translate(-15%, 20%) scale(0.95); }
        }

        /* Ultra minimal navigation */
        .navbar {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
            display: flex;
            gap: 30px;
        }

        .nav-btn {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #00cc55;
            transition: width 0.3s ease;
        }

        .nav-btn:hover {
            color: white;
        }

        .nav-btn:hover::after {
            width: 100%;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(6rem, 16vw, 14rem);
            font-weight: 100;
            letter-spacing: -0.08em;
            background: linear-gradient(90deg, #fff, #00cc55, #fff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 200% center; }
            50% { background-position: -200% center; }
        }

        .section {
            min-height: 100vh;
            padding: 120px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 200;
            margin-bottom: 60px;
            letter-spacing: -1px;
            opacity: 0.9;
        }

        /* Minimal content boxes */
        .content-box {
            padding: 60px 40px;
            position: relative;
            margin-bottom: 30px;
            text-align: left;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .stat-card {
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 100;
            color: #00cc55;
            margin-bottom: 10px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-minimal {
            max-width: 400px;
            margin: 0 auto 40px;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            color: white;
            font-size: 15px;
            font-weight: 300;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-bottom-color: rgba(0, 204, 85, 0.5);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Custom expiry dropdown styling */
        .expiry-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .expiry-container input {
            width: 80px;
        }

        .expiry-container select {
            width: 120px;
        }

        /* Custom dropdown styling */
        .custom-dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .dropdown-trigger {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            color: white;
            font-size: 13px;
            font-weight: 300;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .dropdown-trigger:hover {
            border-color: rgba(0, 204, 85, 0.3);
        }

        .dropdown-trigger.active {
            border-color: rgba(0, 204, 85, 0.5);
        }

        .dropdown-arrow {
            transition: transform 0.3s ease;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .dropdown-trigger.active .dropdown-arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(0, 204, 85, 0.2);
            border-top: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 10px 12px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: rgba(0, 204, 85, 0.1);
            color: white;
        }

        .dropdown-item.selected {
            background: rgba(0, 204, 85, 0.2);
            color: #00cc55;
        }

        .expiry-container .custom-dropdown {
            width: auto;
            min-width: 120px;
        }

        /* Ultra minimal button */
        .btn-minimal {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 14px 50px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-minimal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: rgba(0, 204, 85, 0.1);
            transition: width 0.4s ease;
            z-index: -1;
        }

        .btn-minimal:hover {
            color: white;
            border-color: rgba(0, 204, 85, 0.5);
        }

        .btn-minimal:hover::before {
            width: 100%;
        }

        .btn-danger {
            border-color: rgba(255, 68, 68, 0.3);
            color: rgba(255, 68, 68, 0.8);
        }

        .btn-danger:hover {
            border-color: rgba(255, 68, 68, 0.5);
            color: rgba(255, 68, 68, 1);
        }

        .btn-danger::before {
            background: rgba(255, 68, 68, 0.1);
        }

        .btn-success {
            border-color: rgba(0, 255, 136, 0.3);
            color: rgba(0, 255, 136, 0.8);
        }

        .btn-success:hover {
            border-color: rgba(0, 255, 136, 0.5);
            color: rgba(0, 255, 136, 1);
        }

        .btn-success::before {
            background: rgba(0, 255, 136, 0.1);
        }

        .keys-list {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 40px;
        }

        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .key-item:hover {
            border-color: rgba(0, 204, 85, 0.3);
        }

        .key-info {
            flex: 1;
        }

        .key-value {
            font-family: 'Courier New', monospace;
            font-weight: 300;
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .key-status {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-active {
            color: rgba(0, 255, 136, 0.8);
        }

        .status-inactive {
            color: rgba(255, 68, 68, 0.8);
        }

        .status-assigned {
            color: rgba(68, 136, 255, 0.8);
        }

        .key-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 11px;
            width: auto;
        }

        .key-details {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 5px;
            font-weight: 300;
        }

        .alert {
            padding: 20px;
            margin-bottom: 30px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.05);
            color: rgba(0, 255, 136, 0.8);
            border-color: rgba(0, 255, 136, 0.2);
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.05);
            color: rgba(255, 68, 68, 0.8);
            border-color: rgba(255, 68, 68, 0.2);
        }

        .alert-info {
            background: rgba(68, 136, 255, 0.05);
            color: rgba(68, 136, 255, 0.8);
            border-color: rgba(68, 136, 255, 0.2);
        }

        .logout-link {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }

        .logout-link a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .logout-link a:hover {
            color: rgba(0, 204, 85, 0.7);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                top: 25px;
                left: 25px;
                gap: 20px;
            }
            
            .nav-btn {
                font-size: 12px;
            }
            
            .section {
                padding: 80px 25px;
            }
            
            .content-box {
                padding: 40px 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .hero-title {
                font-size: 5rem;
            }

            .logout-link {
                bottom: 25px;
                right: 25px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .hero-title {
                font-size: 4rem;
            }
            
            .btn-minimal {
                padding: 12px 35px;
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#stats" class="nav-btn">stats</a>
        <a href="#create" class="nav-btn">create</a>
        <a href="#assign" class="nav-btn">assign</a>
        <a href="#manage" class="nav-btn">manage</a>
    </nav>

    <section class="hero">
        <h1 class="hero-title">admin</h1>
    </section>

    <section id="stats" class="section">
        <div class="container">
            <h2 class="section-title">statistics</h2>
            <div class="content-box">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="total-keys">0</div>
                        <div class="stat-label">total keys</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="active-keys">0</div>
                        <div class="stat-label">active keys</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="assigned-keys">0</div>
                        <div class="stat-label">assigned keys</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="total-downloads">0</div>
                        <div class="stat-label">total downloads</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="create" class="section">
        <div class="container">
            <h2 class="section-title">create keys</h2>
            <div class="content-box">
                <div id="alerts"></div>
                <form class="form-minimal" id="create-key-form">
                    <div class="form-group">
                        <label for="key-prefix">key prefix</label>
                        <input type="text" id="key-prefix" placeholder="e.g., USER" value="KEY">
                    </div>
                    <div class="form-group">
                        <label for="key-count">number of keys</label>
                        <input type="number" id="key-count" value="1" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label for="expiry-duration">expiry duration (optional)</label>
                        <div class="expiry-container">
                            <input type="number" id="expiry-number" placeholder="1" min="1" max="999">
                            <div class="custom-dropdown" id="expiry-unit-dropdown">
                                <div class="dropdown-trigger" onclick="toggleDropdown('expiry-unit-dropdown')">
                                    <span id="expiry-unit-text">permanent</span>
                                    <span class="dropdown-arrow">▼</span>
                                </div>
                                <div class="dropdown-menu" id="expiry-unit-menu">
                                    <div class="dropdown-item selected" data-value="" onclick="selectDropdownItem('expiry-unit-dropdown', '', 'permanent')">permanent</div>
                                    <div class="dropdown-item" data-value="minutes" onclick="selectDropdownItem('expiry-unit-dropdown', 'minutes', 'minutes')">minutes</div>
                                    <div class="dropdown-item" data-value="hours" onclick="selectDropdownItem('expiry-unit-dropdown', 'hours', 'hours')">hours</div>
                                    <div class="dropdown-item" data-value="days" onclick="selectDropdownItem('expiry-unit-dropdown', 'days', 'days')">days</div>
                                    <div class="dropdown-item" data-value="weeks" onclick="selectDropdownItem('expiry-unit-dropdown', 'weeks', 'weeks')">weeks</div>
                                    <div class="dropdown-item" data-value="months" onclick="selectDropdownItem('expiry-unit-dropdown', 'months', 'months')">months</div>
                                    <div class="dropdown-item" data-value="years" onclick="selectDropdownItem('expiry-unit-dropdown', 'years', 'years')">years</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-minimal btn-success">create keys</button>
                </form>
            </div>
        </div>
    </section>

    <section id="assign" class="section">
        <div class="container">
            <h2 class="section-title">assign key</h2>
            <div class="content-box">
                <form class="form-minimal" id="assign-key-form">
                    <div class="form-group">
                        <label for="assign-username">username</label>
                        <input type="text" id="assign-username" placeholder="enter username">
                    </div>
                    <div class="form-group">
                        <label for="assign-key">license key</label>
                        <div class="custom-dropdown" id="assign-key-dropdown">
                            <div class="dropdown-trigger" onclick="toggleDropdown('assign-key-dropdown')">
                                <span id="assign-key-text">select a key...</span>
                                <span class="dropdown-arrow">▼</span>
                            </div>
                            <div class="dropdown-menu" id="assign-key-menu">
                                <div class="dropdown-item selected" data-value="" onclick="selectDropdownItem('assign-key-dropdown', '', 'select a key...')">select a key...</div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-minimal">assign key</button>
                </form>
            </div>
        </div>
    </section>

    <section id="manage" class="section">
        <div class="container">
            <h2 class="section-title">manage keys</h2>
            <div class="content-box">
                <div id="keys-container" class="keys-list">
                    <p style="text-align: center; color: rgba(255, 255, 255, 0.3); padding: 40px; font-weight: 300;">loading keys...</p>
                </div>
            </div>
        </div>
    </section>

    <div class="logout-link">
        <a href="#" onclick="logout()">logout</a>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/api';

        // Custom dropdown functions
        function toggleDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const trigger = dropdown.querySelector('.dropdown-trigger');
            const menu = dropdown.querySelector('.dropdown-menu');
            
            // Close all other dropdowns
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu !== dropdown.querySelector('.dropdown-menu')) {
                    menu.classList.remove('show');
                    menu.closest('.custom-dropdown').querySelector('.dropdown-trigger').classList.remove('active');
                }
            });
            
            // Toggle current dropdown
            menu.classList.toggle('show');
            trigger.classList.toggle('active');
        }

        function selectDropdownItem(dropdownId, value, text) {
            const dropdown = document.getElementById(dropdownId);
            const trigger = dropdown.querySelector('.dropdown-trigger');
            const menu = dropdown.querySelector('.dropdown-menu');
            const textSpan = dropdown.querySelector('span:first-child');
            
            // Update selected item
            menu.querySelectorAll('.dropdown-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            // Update trigger text
            textSpan.textContent = text;
            
            // Close dropdown
            menu.classList.remove('show');
            trigger.classList.remove('active');
            
            // Store the selected value
            dropdown.dataset.selectedValue = value;
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                    menu.closest('.custom-dropdown').querySelector('.dropdown-trigger').classList.remove('active');
                });
            }
        });

        // Get selected value from custom dropdown
        function getDropdownValue(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            return dropdown.dataset.selectedValue || '';
        }

        // Set dropdown value programmatically
        function setDropdownValue(dropdownId, value, text) {
            const dropdown = document.getElementById(dropdownId);
            const textSpan = dropdown.querySelector('span:first-child');
            const menu = dropdown.querySelector('.dropdown-menu');
            
            // Update text
            textSpan.textContent = text;
            
            // Update selected item
            menu.querySelectorAll('.dropdown-item').forEach(item => {
                item.classList.remove('selected');
                if (item.dataset.value === value) {
                    item.classList.add('selected');
                }
            });
            
            // Store the selected value
            dropdown.dataset.selectedValue = value;
        }

        // Check if admin is logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = 'admin_login.html';
                return;
            }
            
            loadStats();
            loadKeys();
            loadUnassignedKeys();
        });

        // Create new license keys
        document.getElementById('create-key-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const prefix = document.getElementById('key-prefix').value.trim();
            const count = parseInt(document.getElementById('key-count').value);
            const expiryNumber = parseInt(document.getElementById('expiry-number').value) || 0;
            const expiryUnit = getDropdownValue('expiry-unit-dropdown');
            
            if (!prefix) {
                showAlert('please enter a key prefix', 'error');
                return;
            }
            
            // Calculate expiry date if specified
            let expiryDate = null;
            if (expiryNumber > 0 && expiryUnit) {
                const now = new Date();
                switch (expiryUnit) {
                    case 'minutes':
                        expiryDate = new Date(now.getTime() + (expiryNumber * 60 * 1000));
                        break;
                    case 'hours':
                        expiryDate = new Date(now.getTime() + (expiryNumber * 60 * 60 * 1000));
                        break;
                    case 'days':
                        expiryDate = new Date(now.getTime() + (expiryNumber * 24 * 60 * 60 * 1000));
                        break;
                    case 'weeks':
                        expiryDate = new Date(now.getTime() + (expiryNumber * 7 * 24 * 60 * 60 * 1000));
                        break;
                    case 'months':
                        expiryDate = new Date(now.getFullYear(), now.getMonth() + expiryNumber, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());
                        break;
                    case 'years':
                        expiryDate = new Date(now.getFullYear() + expiryNumber, now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());
                        break;
                }
                expiryDate = expiryDate.toISOString().slice(0, 19).replace('T', ' ');
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/create_keys.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        prefix: prefix,
                        count: count,
                        expiry_date: expiryDate || null
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`successfully created ${count} license key(s)`, 'success');
                    document.getElementById('create-key-form').reset();
                    document.getElementById('key-prefix').value = 'KEY';
                    document.getElementById('key-count').value = '1';
                    
                    // Download the generated keys
                    downloadKeys(result.data.keys);
                    
                    loadKeys();
                    loadStats();
                    loadUnassignedKeys();
                } else {
                    showAlert(result.message || 'failed to create keys', 'error');
                }
            } catch (error) {
                console.error('Error creating keys:', error);
                showAlert('error creating keys', 'error');
            }
        });

        // Assign key to user
        document.getElementById('assign-key-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('assign-username').value.trim();
            const licenseKey = getDropdownValue('assign-key-dropdown');
            
            if (!username || !licenseKey) {
                showAlert('please enter both username and select a key', 'error');
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/assign_key.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        username: username,
                        license_key: licenseKey
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('key assigned successfully', 'success');
                    document.getElementById('assign-key-form').reset();
                    loadKeys();
                    loadStats();
                    loadUnassignedKeys();
                } else {
                    showAlert(result.message || 'failed to assign key', 'error');
                }
            } catch (error) {
                console.error('Error assigning key:', error);
                showAlert('error assigning key', 'error');
            }
        });

        // Load statistics
        async function loadStats() {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/stats.php?token=${encodeURIComponent(token)}`);
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('total-keys').textContent = result.data.total_keys;
                    document.getElementById('active-keys').textContent = result.data.active_keys;
                    document.getElementById('assigned-keys').textContent = result.data.assigned_keys;
                    document.getElementById('total-downloads').textContent = result.data.total_downloads;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load all keys
        async function loadKeys() {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/keys.php?token=${encodeURIComponent(token)}`);
                
                const result = await response.json();
                
                if (result.success) {
                    displayKeys(result.data);
                } else {
                    document.getElementById('keys-container').innerHTML = '<p style="text-align: center; color: rgba(255, 255, 255, 0.3); padding: 40px; font-weight: 300;">error loading keys</p>';
                }
            } catch (error) {
                console.error('Error loading keys:', error);
                document.getElementById('keys-container').innerHTML = '<p style="text-align: center; color: rgba(255, 255, 255, 0.3); padding: 40px; font-weight: 300;">error loading keys</p>';
            }
        }

        // Load unassigned keys for dropdown
        async function loadUnassignedKeys() {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/unassigned_keys.php?token=${encodeURIComponent(token)}`);
                
                const result = await response.json();
                
                if (result.success) {
                    const menu = document.getElementById('assign-key-menu');
                    menu.innerHTML = '<div class="dropdown-item selected" data-value="" onclick="selectDropdownItem(\'assign-key-dropdown\', \'\', \'select a key...\')">select a key...</div>';
                    
                    result.data.forEach(key => {
                        const item = document.createElement('div');
                        item.className = 'dropdown-item';
                        item.dataset.value = key.license_key;
                        item.textContent = key.license_key;
                        item.onclick = () => selectDropdownItem('assign-key-dropdown', key.license_key, key.license_key);
                        menu.appendChild(item);
                    });
                }
            } catch (error) {
                console.error('Error loading unassigned keys:', error);
            }
        }

        // Display keys in the UI
        function displayKeys(keys) {
            const container = document.getElementById('keys-container');
            
            if (keys.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255, 255, 255, 0.3); padding: 40px; font-weight: 300;">no keys found</p>';
                return;
            }
            
            container.innerHTML = keys.map(key => `
                <div class="key-item">
                    <div class="key-info">
                        <div class="key-value">${key.license_key}</div>
                        <div class="key-status ${getStatusClass(key)}">${getStatusText(key)}</div>
                        <div class="key-details">
                            ${key.assigned_user ? `user: ${key.assigned_user}` : 'unassigned'}
                            ${getExpiryText(key)}
                            ${key.hwid ? `<br>hwid: ${key.hwid.substring(0, 8)}...` : ''}
                        </div>
                    </div>
                    <div class="key-actions">
                        <button class="btn-minimal btn-small ${key.is_active ? 'btn-danger' : 'btn-success'}" onclick="toggleKeyStatus('${key.license_key}', ${key.is_active})">
                            ${key.is_active ? 'deactivate' : 'activate'}
                        </button>
                        ${key.assigned_user ? `<button class="btn-minimal btn-small btn-warning" onclick="resetHwid(${key.user_id}, '${key.assigned_user}')">
                            reset hwid
                        </button>` : ''}
                        <button class="btn-minimal btn-small btn-danger" onclick="deleteKey('${key.license_key}')">
                            delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Get status class for styling
        function getStatusClass(key) {
            if (!key.is_active) return 'status-inactive';
            if (key.user_id) return 'status-assigned';
            return 'status-active';
        }

        // Get status text
        function getStatusText(key) {
            if (!key.is_active) return 'inactive';
            if (key.user_id) return 'assigned';
            return 'active';
        }

        // Get expiry text
        function getExpiryText(key) {
            if (!key.expires_at) {
                return ' • permanent';
            }
            
            const expiryDate = new Date(key.expires_at);
            const now = new Date();
            const timeLeft = expiryDate - now;
            
            if (timeLeft <= 0) {
                return ' • expired';
            }
            
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if (days > 0) {
                return ` • expires in ${days} day${days > 1 ? 's' : ''}`;
            } else if (hours > 0) {
                return ` • expires in ${hours} hour${hours > 1 ? 's' : ''}`;
            } else {
                return ' • expires soon';
            }
        }

        // Toggle key status
        async function toggleKeyStatus(licenseKey, currentStatus) {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/toggle_key.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        license_key: licenseKey,
                        is_active: !currentStatus
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`key ${!currentStatus ? 'activated' : 'deactivated'} successfully`, 'success');
                    loadKeys();
                    loadStats();
                } else {
                    showAlert(result.message || 'failed to update key status', 'error');
                }
            } catch (error) {
                console.error('Error toggling key status:', error);
                showAlert('error updating key status', 'error');
            }
        }

        // Delete key
        async function deleteKey(licenseKey) {
            if (!confirm('are you sure you want to delete this key? this action cannot be undone.')) {
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/delete_key.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        license_key: licenseKey
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('key deleted successfully', 'success');
                    loadKeys();
                    loadStats();
                    loadUnassignedKeys();
                } else {
                    showAlert(result.message || 'failed to delete key', 'error');
                }
            } catch (error) {
                console.error('Error deleting key:', error);
                showAlert('error deleting key', 'error');
            }
        }
        
        // Reset user HWID
        async function resetHwid(userId, username) {
            if (!confirm(`Are you sure you want to reset HWID for user "${username}"? This will allow them to login from a different computer.`)) {
                return;
            }
            
            const resetReason = prompt('Enter reason for HWID reset (optional):') || 'Admin reset';
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_BASE_URL}/admin/reset_hwid.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        user_id: userId,
                        reset_reason: resetReason
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`HWID reset successfully for ${username}`, 'success');
                    loadKeys(); // Refresh keys to show updated HWID info
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                console.error('Error resetting HWID:', error);
                showAlert('Error resetting HWID', 'error');
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'admin_login.html';
        }

        // Show alert messages
        function showAlert(message, type) {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            alertsContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function downloadKeys(keys) {
            if (!keys || keys.length === 0) {
                showAlert('no keys to download', 'error');
                return;
            }
            
            // Create filename with timestamp
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            const filename = `license_keys_${timestamp}.txt`;
            
            // Create content
            const content = keys.join('\n');
            
            // Create and download file
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.style.display = 'none';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Clean up
            window.URL.revokeObjectURL(url);
            
            showAlert(`downloaded ${keys.length} license key(s)`, 'success');
        }
    </script>
</body>
</html>
